<?xml version="1.0" encoding="UTF-8"?>
<!-- TEMPLATE — open in Inkscape/Figma and polish before uploading to the
     Chrome Web Store. Size matches the official "marquee promo" tile. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1e1e"/>
      <stop offset="1" stop-color="#252526"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Stylized JSON snippet decoration (right side) -->
  <g transform="translate(760,120)" font-family='"JetBrains Mono", "SF Mono", Consolas, monospace' font-size="22" fill="#6a6a6a">
    <text x="0"   y="0">{</text>
    <text x="40"  y="36">"name": <tspan fill="#ce9178">"JSON Tools"</tspan>,</text>
    <text x="40"  y="72">"version": <tspan fill="#b5cea8">126</tspan>,</text>
    <text x="40"  y="108">"modes": [</text>
    <text x="80"  y="144"><tspan fill="#ce9178">"raw"</tspan>,</text>
    <text x="80"  y="180"><tspan fill="#ce9178">"prettier"</tspan>,</text>
    <text x="80"  y="216"><tspan fill="#ce9178">"edit"</tspan></text>
    <text x="40"  y="252">],</text>
    <text x="40"  y="288">"searchable": <tspan fill="#569cd6">true</tspan></text>
    <text x="0"   y="324">}</text>
  </g>

  <!-- Logo + wordmark + tagline (left side) -->
  <g transform="translate(120,184)">
    <g transform="scale(3)">
      <rect width="64" height="64" rx="14" ry="14" fill="#ffffff"/>
      <path fill="#f1592b" d="M 30,30 H 18 v 4 h 12 v 12 h 4 V 34 H 46 V 30 H 34 V 18 h -4 z"/>
      <path fill="#d4d4d4" d="m 2,34 v -4 c 4,0 6,0 6,-6 V 16 C 8,10 10,8 18,8 v 4 c -4,0 -6,0 -6,4 v 8 c 0,3 0,7 -6,8 6,1 6,5 6,8 0,1 0,7 0,8 0,4 2,4 6,4 v 4 C 10,56 8,54 8,48 V 40 C 8,35 6,34 2,34 Z"/>
      <path fill="#d4d4d4" d="m 62,30 v 4 c -4,0 -6,0 -6,6 v 8 c 0,6 -2,8 -10,8 v -4 c 4,0 6,0 6,-4 v -8 c 0,-3 0,-7 6,-8 -6,-1 -6,-5 -6,-8 0,-1 0,-7 0,-8 0,-4 -2,-4 -6,-4 V 8 c 8,0 10,2 10,8 v 8 c 0,5 2,6 6,6 z"/>
    </g>
  </g>
  <g font-family="system-ui, -apple-system, sans-serif" fill="#d4d4d4">
